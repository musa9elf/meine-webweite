<!DOCTYPE html>
<html>
<head>
<title>Meine Visitenkarte</title>
<style>
body {
  background-color: #1a2e1a;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 50px;
}

h1 {
  color: #00d4ff;
  font-size: 40px;
  animation: glow 2s infinite;
}

p {
  font-size: 18px;
  color: #aaaaaa;
}

.button {
  background-color: #00d4ff;
  color: black;
  padding: 15px 30px;
  border-radius: 25px;
  text-decoration: none;
  font-size: 16px;
  transition: all 0.3s ease;
}

.button:hover {
  background-color: white;
  color: #1a1a2e;
  transform: scale(1.1);
}

@keyframes glow {
  0% { text-shadow: 0 0 10px #00d4ff; }
  50% { text-shadow: 0 0 30px #00d4ff; }
  100% { text-shadow: 0 0 10px #00d4ff; }
}
</style>
</head>
<body>
<h1>Mula</h1>
<p>Beispiel Webseite</p>
<p>mula@email.com</p>
<br>
<button class="button" onclick="zeigeNachricht()">Kontakt aufnehmen</button>
<script>
  function zeigeNachricht() {
    alert("Danke für deinen Besuch!");
  }
</script>
</body>
</html>
