<!DOCTYPE html>
<html>
<head>
<title>Meine Visitenkarte</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body {
  background-color: #1a2e1a;
  color: white;
  font-family: 'Inter', Arial, sans-serif;
  text-align: center;
  padding: 50px;
}

h1 {
  color: #00d4ff;
  font-size: 40px;
  animation: glow 2s infinite;
}

p {
  font-size: 18px;
  color: #aaaaaa;
}

.button {
  background-color: #00d4ff;
  color: black;
  padding: 15px 30px;
  border-radius: 25px;
  text-decoration: none;
  font-size: 16px;
  transition: all 0.3s ease;
}

.button:hover {
  background-color: white;
  color: #1a1a2e;
  transform: scale(1.1);
}

@keyframes glow {
  0% { text-shadow: 0 0 10px #00d4ff; }
  50% { text-shadow: 0 0 30px #00d4ff; }
  100% { text-shadow: 0 0 10px #00d4ff; }
}
</style>
</head>
<body>
<body>

<section class="hero">
  <h1>Dein Name</h1>
  <p class="subtitle">Premium Webseiten · Video · KI</p>
  <button class="button" onclick="zeigeNachricht()">Kontakt aufnehmen</button>
</section>

<section class="about">
  <h2>Was ich mache</h2>
  <p>Ich helfe Wiener Unternehmen mit modernen Webseiten, professionellen Videos und KI-Automatisierung.</p>
</section>

<section class="services">
  <h2>Leistungen</h2>
  <div class="cards">
    <div class="card">🌐 Premium Webseiten</div>
    <div class="card">🎬 Videoproduktion</div>
    <div class="card">🤖 KI-Automatisierung</div>
  </div>
</section>

</body>
</body>
</html>
