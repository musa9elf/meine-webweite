<!DOCTYPE html>
<html>
<head>
<title>Meine Visitenkarte</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background-color: rgba(26, 26, 46, 0.9);
  padding: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 20px;
  font-size: 16px;
}

nav a:hover {
  color: #00d4ff;
}
  tml {
  scroll-behavior: smooth;
}
body {
  background-color: #1a1a2e;
  color: white;
  font-family: 'Inter', Arial, sans-serif;
  text-align: center;
  padding: 50px;
}

h1 {
  color: #00d4ff;
  font-size: 40px;
  animation: glow 2s infinite;
}

p {
  font-size: 18px;
  color: #aaaaaa;
}

.button {
  background-color: #00d4ff;
  color: black;
  padding: 15px 30px;
  border-radius: 25px;
  text-decoration: none;
  font-size: 16px;
  transition: all 0.3s ease;
}

.button:hover {
  background-color: white;
  color: #1a1a2e;
  transform: scale(1.1);
}

@keyframes glow {
  0% { text-shadow: 0 0 10px #00d4ff; }
  50% { text-shadow: 0 0 30px #00d4ff; }
  100% { text-shadow: 0 0 10px #00d4ff; }
}
.hero {
  padding: 120px 20px;
  border-bottom: 1px solid #333;
}

.subtitle {
  font-size: 20px;
  color: #888;
  margin-bottom: 40px;
}

.about {
  padding: 80px 20px;
  max-width: 600px;
  margin: 0 auto;
  border-bottom: 1px solid #333;
}

.services {
  padding: 80px 20px;
}

.cards {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 40px;
}

.card {
  background-color: #16213e;
  padding: 40px 30px;
  border-radius: 15px;
  font-size: 18px;
  width: 200px;
}
</style>
</head>
<body>
<body>
  <nav>
  <a href="#about">Über mich</a>
  <a href="#services">Leistungen</a>
  <a href="#contact">Kontakt</a>
</nav>

<section class="hero">
  <h1>Dein Name</h1>
  <p class="subtitle">Premium Webseiten · Video · KI</p>
  <button class="button" onclick="zeigeNachricht()">Kontakt aufnehmen</button>
</section>

<section class="about">
  <h2>Was ich mache</h2>
  <p>Ich helfe Wiener Unternehmen mit modernen Webseiten, professionellen Videos und KI-Automatisierung.</p>
</section>

<section class="services">
  <h2>Leistungen</h2>
  <div class="cards">
    <div class="card">🌐 Premium Webseiten</div>
    <div class="card">🎬 Videoproduktion</div>
    <div class="card">🤖 KI-Automatisierung</div>
  </div>
</section>

</body>
</body>
</html>
